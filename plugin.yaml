name: m365_email
label: M365 Email
kind: platform
version: 0.1.0
description: Microsoft 365 email platform adapter for Hermes gateway using Microsoft Graph API
provides_tools:
  - list_mail
  - get_email
  - get_summary
  - get_attachment
  - send_email
  - reply_email
  - reply_all
  - forward_email
  - mark_read
  - mark_unread
  - confirm_send_email
  - confirm_reply_email
  - confirm_reply_all
  - confirm_forward_email
requires_env:
  - M365_MAIL_CLIENT_ID
  - M365_MAIL_CLIENT_SECRET
  - M365_MAIL_TENANT_ID
  - M365_MAILBOX_USER
optional_env:
  - EMAIL_ALLOWED_USERS
  - M365_ATTACHMENT_MAX_BYTES
  - M365_EMAIL_STATE_PATH
  - M365_POLL_INTERVAL_SECONDS
  - DISABLE_SEND_CONFIRM
  - M365_SUMMARY_MODEL
  - M365_SUMMARY_PROVIDER
